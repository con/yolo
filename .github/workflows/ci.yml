---
name: CI

on:
  push:
    # TODO: remove redesign-python after merge
    branches: [main, redesign-python]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv && uv pip install -e ".[dev]"
      - uses: pre-commit/action@v3.0.1

  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: codespell-project/actions-codespell@v2

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: container-extras

  unit-tests:
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     os: [ubuntu-latest, macos-latest, windows-latest]
    #     python-version: ["3.11", "3.12", "3.13"]
    # runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # - run: >-
      #     uv venv --python ${{ matrix.python-version }}
      #     && uv pip install -e ".[dev]"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: .venv/bin/pytest tests/test_config.py tests/test_builder.py

  integration-tests:
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     os: [ubuntu-latest, macos-latest, windows-latest]
    #     python-version: ["3.11", "3.12", "3.13"]
    # runs-on: ${{ matrix.os }}
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv && uv pip install -e ".[dev]"
      - name: Build base image
        run: echo "TODO - podman build base image" && exit 1
      - name: Build extras image
        run: echo "TODO - yo build" && exit 1
      - name: Verify container
        run: echo "TODO - run container and check tools" && exit 1
